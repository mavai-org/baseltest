# The fortune teller: one declaration, two questions. The file carries the
# claim; the invocation sizes the run.
#   basel test fortune-teller.yaml                  -> does it clear its bar? (verdict,
#                                                          at the bar's derived minimum)
#   basel measure fortune-teller.yaml --samples 200 -> what does it actually do?
#                                                          (baseline persisted)
format: mavai-contract/1
contract: fortune-teller-is-usually-encouraging
service: fortune-teller

criteria:
  - name: fortune-is-delivered
    threshold: 0.8
    matches: "fortune|favour|surprise"
  - name: spirits-stay-polite          # no threshold: recorded by measure,
    contains: "."                      # skipped (with notice) by test

inputs:
  - "Alice"
  - "Bob"
  - "Chandrima"
