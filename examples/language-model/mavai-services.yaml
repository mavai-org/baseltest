# The basket-builder from the getting-started guide: a language model
# given a job. Credentials come from the environment:
#   export OPENAI_API_KEY=...      # the baseline
#   export ANTHROPIC_API_KEY=...   # the claude exploration entry
#   export PUBLICAI_API_KEY=...    # only if you uncomment the apertus entry
#
# The response-schema is part of the service's identity; openai and
# anthropic both honour it through their structured-output mechanisms.
# Providers differ, though: apertus's hosted endpoint has none, so if you
# uncomment that entry, `explore` runs its configuration WITHOUT the
# schema and says so in a console note (`measure` and `test` would refuse
# instead — there the schema defines the measured population). The system
# prompt still states the output shape, so a cross-provider comparison
# stays fair either way.
format: mavai-services/1
services:
  basket-builder:
    type: language-model
    configuration:                 # the baseline — what `test` and `measure` run
      provider: openai
      model: gpt-4o-mini
      response-schema:                # structured-output rules are strict:
        type: object                  # every object needs required: and
        additionalProperties: false   # additionalProperties: false, or the
        required: [items]             # provider rejects the request
        properties:
          items:
            type: array
            items:
              type: object
              additionalProperties: false
              required: [name, quantity]
              properties:
                name: {type: string}
                quantity: {type: integer}
      system-prompt: >
        You translate shopping instructions into a JSON basket.
        Respond with only a JSON object.
      temperature: 0.2
    explorations:                  # `basel explore` runs the baseline plus these
      - provider: anthropic        # same job, same temperature, different model
        model: claude-haiku-4-5-20251001
#      - provider: apertus          # optional third model: the fully open Swiss
#        model: swiss-ai/Apertus-70B-Instruct-2509   # model, served by publicai.co
    optimizations:                 # `basel optimize <contract> <id>` runs one of these;
                                   # `test` and `measure` never read the section
      - id: prompt-tuning              # a meta-LLM proposes each next system prompt from
        stepper: prompt-engineer       # the previous iteration's failures; no `initial:`,
        stepper-config: {model: gpt-4o}   # so iteration 0 scores the incumbent prompt
        max-iterations: 5
        no-improvement-window: 2         # stop after 2 iterations without improvement

      - id: temperature-linear         # 0.0, 0.1, 0.2, … — the plateau window abandons
        stepper: linear-sweep          # the walk as soon as it stops paying
        stepper-config: {key: temperature, step: 0.1, stop: 1.0}
        initial: {temperature: 0.0}    # iteration 0: the baseline with this overlaid
        max-iterations: 11
        no-improvement-window: 3

      - id: temperature-honing         # divide and conquer: 0.0 → 0.5 → 0.25 → 0.375 …
        stepper: bisection             # assumes the score is roughly unimodal in the key
        stepper-config: {key: temperature, lo: 0.0, hi: 1.0, tolerance: 0.05}
        initial: {temperature: 0.0}
        max-iterations: 8
