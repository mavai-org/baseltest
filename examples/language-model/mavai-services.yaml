# The basket-builder from the getting-started guide: a language model
# given a job. Credentials come from the environment:
#   export OPENAI_API_KEY=...      # the baseline and the temperature entries
#   export PUBLICAI_API_KEY=...    # the apertus entry (publicai.co serves it)
#
# The guide's walkthrough adds a response-schema to this configuration; it
# is omitted here because the explore grid below spans two providers, and a
# grid carries only covariates every provider honours — apertus has no
# structured-output support in the sense openai/anthropic provide it, and
# baseltest refuses to silently drop a declared schema. So the schema
# information rides in the system prompt instead, shared by every grid
# point: both models get the same instructions, and the only covariates
# that differ across the comparison are the ones being compared.
format: mavai-services/1
services:
  basket-builder:
    type: language-model
    configuration:                 # the baseline — what `test` and `measure` run
      provider: openai
      model: gpt-4o-mini
      system-prompt: >
        You translate shopping instructions into a JSON basket.
        Respond with only a JSON object — no code fences, no prose —
        of the form {"items": [{"name": "eggs", "quantity": 6}]}.
      temperature: 0.2
    explorations:                  # `baseltest explore` runs the baseline plus these
      - temperature: 0.0           # (each entry: the baseline with these values replaced)
      - temperature: 0.7
      - provider: apertus          # the fully open Swiss model — same job, same
        model: swiss-ai/Apertus-70B-Instruct-2509   # temperature, different model
